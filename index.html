<!DOCTYPE html>
<html class="light" lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OMDB API ile film arama uygulaması">
  <title>Film Ara — Arama Sonuçları</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;0,900;1,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            secondary: "#7c52aa",
            primary: "#e040a0",
            tertiary: "#0096cc",
            background: "#fef7ff",
            surface: "#fef7ff",
            "on-surface": "#2e1a28",
            "on-background": "#2e1a28",
            "on-surface-variant": "#604868",
            "surface-container": "#f8eef8",
            "surface-container-high": "#f2e8f2",
            "surface-container-lowest": "#ffffff",
            "secondary-container": "#eedcff",
            "on-secondary-container": "#2e2040",
            "primary-container": "#f080c0",
            "on-primary-container": "#2e1a28",
            "tertiary-container": "#40c0ee",
            "primary-fixed": "#ffd6ee",
            "on-primary-fixed-variant": "#a02070",
            "secondary-fixed": "#eedcff",
            "on-secondary-fixed-variant": "#4a3068",
            "tertiary-fixed": "#c8eaff",
            "on-tertiary-fixed-variant": "#005580",
            outline: "#907898",
            "outline-variant": "#dcc8e0",
            "error-container": "#ffe8e8",
            "on-error-container": "#9b1c1c",
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", full: "9999px" },
          fontFamily: { sans: ["DM Sans", "system-ui", "sans-serif"] },
        },
      },
    };
  </script>
</head>
<body class="bg-background text-on-surface min-h-screen pb-24 md:pb-0">
  <header class="fixed top-0 left-0 right-0 z-50 bg-surface/80 backdrop-blur-md shadow-[0_4px_16px_rgba(224,64,160,0.15)]">
    <div class="flex justify-between items-center w-full px-4 md:px-6 py-4 max-w-7xl mx-auto gap-4">
      <div class="flex items-center gap-4 md:gap-8 min-w-0">
        <h1 class="text-xl md:text-2xl font-black text-primary italic shrink-0">Film Ara</h1>
        <p class="hidden lg:block text-sm text-on-surface-variant font-medium truncate">OMDB veritabanı</p>
      </div>
      <form id="searchForm" class="flex items-center flex-1 max-w-md gap-2" novalidate>
        <div class="flex items-center flex-1 bg-surface-container rounded-full px-3 md:px-4 py-2 border-2 border-transparent focus-within:border-primary transition-all min-w-0">
          <span class="material-symbols-outlined text-on-surface-variant text-xl shrink-0" aria-hidden="true">search</span>
          <input
            id="searchInput"
            type="search"
            name="title"
            class="bg-transparent border-none focus:ring-0 text-sm w-full font-medium placeholder:text-on-surface-variant/50 min-w-0"
            placeholder="Film ara..."
            autocomplete="off"
            required
          >
        </div>
        <button type="submit" id="searchBtn" class="shrink-0 px-4 md:px-5 py-2 bg-primary text-white font-bold rounded-full candy-shadow-primary bouncy-hover text-sm">
          Ara
        </button>
      </form>
    </div>
  </header>

  <main id="browseView" class="pt-24 max-w-7xl mx-auto px-4 md:px-6 grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-8 mb-12">
    <aside class="md:col-span-3 space-y-6">
      <div class="bg-white p-5 md:p-6 rounded-lg candy-shadow-secondary border border-secondary-container/30">
        <h2 class="text-xl font-bold text-secondary mb-5 flex items-center gap-2">
          <span class="material-symbols-outlined" aria-hidden="true">tune</span>
          Filtreler
        </h2>

        <div class="mb-6 md:hidden">
          <label class="text-xs font-bold text-on-surface-variant block mb-2 uppercase tracking-wider" for="searchInputSidebar">Arama</label>
          <div class="bg-surface-container rounded-full px-4 py-3 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary" aria-hidden="true">search</span>
            <input id="searchInputSidebar" type="search" class="bg-transparent border-none focus:ring-0 w-full font-bold text-sm" placeholder="Film adı...">
          </div>
        </div>

        <div class="mb-6">
          <label class="text-xs font-bold text-on-surface-variant block mb-3 uppercase tracking-wider" for="typeFilter">İçerik türü</label>
          <select id="typeFilter" name="type" class="w-full rounded-full bg-surface-container border-outline-variant/50 text-sm font-bold py-2.5 px-4 focus:border-primary focus:ring-primary">
            <option value="">Tümü</option>
            <option value="movie">Film</option>
            <option value="series">Dizi</option>
            <option value="episode">Bölüm</option>
          </select>
        </div>

        <div class="mb-6">
          <span class="text-xs font-bold text-on-surface-variant block mb-3 uppercase tracking-wider">Yayın yılı</span>
          <div class="flex items-center gap-2">
            <input id="yearMin" type="number" min="1888" max="2099" placeholder="Min" class="w-full rounded-full bg-surface-container border-outline-variant/50 text-sm font-bold py-2 px-3 focus:border-primary focus:ring-primary">
            <span class="text-on-surface-variant font-bold">—</span>
            <input id="yearMax" type="number" min="1888" max="2099" placeholder="Max" class="w-full rounded-full bg-surface-container border-outline-variant/50 text-sm font-bold py-2 px-3 focus:border-primary focus:ring-primary">
          </div>
        </div>

        <div class="mb-6">
          <span class="text-xs font-bold text-on-surface-variant block mb-3 uppercase tracking-wider">Tür etiketi</span>
          <div id="genreChips" class="flex flex-wrap gap-2" role="group" aria-label="Tür filtresi">
            <button type="button" data-genre="" class="genre-chip px-3 py-1.5 rounded-full bg-primary text-white text-xs font-bold candy-shadow-primary">Tümü</button>
            <button type="button" data-genre="Action" class="genre-chip px-3 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant text-xs font-bold bouncy-hover">Action</button>
            <button type="button" data-genre="Comedy" class="genre-chip px-3 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant text-xs font-bold bouncy-hover">Comedy</button>
            <button type="button" data-genre="Drama" class="genre-chip px-3 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant text-xs font-bold bouncy-hover">Drama</button>
            <button type="button" data-genre="Sci-Fi" class="genre-chip px-3 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant text-xs font-bold bouncy-hover">Sci-Fi</button>
            <button type="button" data-genre="Horror" class="genre-chip px-3 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant text-xs font-bold bouncy-hover">Horror</button>
          </div>
        </div>

        <button type="button" id="applyFiltersBtn" class="w-full py-3.5 bg-primary-container text-on-primary-container font-black rounded-full bouncy-hover candy-shadow-primary flex justify-center items-center gap-2">
          Filtreleri uygula
        </button>
      </div>
    </aside>

    <div class="md:col-span-9 space-y-6">
      <div id="loading" class="flex items-center justify-center gap-3 py-12 text-on-surface-variant" hidden aria-live="polite">
        <span class="spinner" aria-hidden="true"></span>
        <span class="font-medium">Aranıyor…</span>
      </div>

      <div id="errorState" class="md:col-span-9" hidden></div>

      <div id="welcome" class="text-center py-16 px-4">
        <span class="material-symbols-outlined text-6xl text-primary/40 mb-4" aria-hidden="true">movie</span>
        <p class="text-on-surface-variant font-medium">Film adı yazıp aramaya başlayın.</p>
      </div>

      <section id="resultsSection" class="space-y-6" hidden>
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
          <div>
            <h2 class="text-3xl md:text-4xl font-black text-on-surface tracking-tight">Arama Sonuçları</h2>
            <p id="resultsSummary" class="text-on-surface-variant font-medium mt-1"></p>
          </div>
        </div>

        <div id="resultsGrid" class="grid grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6"></div>

        <nav id="pagination" class="flex justify-center items-center gap-3 py-6" hidden aria-label="Sayfalama"></nav>
      </section>
    </div>
  </main>

  <section id="detailView" class="detail-view" hidden aria-labelledby="detailPageTitle">
    <div class="detail-view__toolbar max-w-7xl mx-auto px-4 md:px-6 pt-24 pb-4">
      <button type="button" id="detailBackBtn" class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white border border-outline-variant/50 font-bold text-sm text-on-surface-variant hover:text-primary hover:border-primary transition-colors bouncy-hover">
        <span class="material-symbols-outlined text-lg" aria-hidden="true">arrow_back</span>
        Sonuçlara dön
      </button>
    </div>
    <div id="detailContent" class="max-w-7xl mx-auto px-4 md:px-6 pb-16"></div>
  </section>

  <footer id="siteFooter" class="max-w-7xl mx-auto px-6 pb-8 text-center text-sm text-on-surface-variant">
    <p>Veriler <a href="https://www.omdbapi.com/" target="_blank" rel="noopener noreferrer" class="text-primary hover:underline">OMDB API</a> üzerinden sağlanır.</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
